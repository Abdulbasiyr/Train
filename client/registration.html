<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration</title>

  <link rel="stylesheet" href="/css/registration.css">
</head>
<body>
  
  <div class="container">

    <form id="signInForm" >
      <h1>Sign in</h1>
      <input type="email"    placeholder="Email"    id="signInEmail"    required >
      <input type="password" placeholder="Password" id="signInPassword" required >
      <button type="submit" id="submitSignIn">Sign in</button>
    </form>


    <form id="signUpForm" >
      <h1>Welcome back</h1>
      <input type="name"     placeholder="Name"     id="signUpName"     required>
      <input type="email"    placeholder="Email"    id="signUpEmail"    required>
      <input type="password" placeholder="Password" id="signUpPassword" required>
      <button type="submit" id="submitSignUp">Sign up</button>
    </form>
    <p class="message"></p>
  </div>

  <script type="module" src="/js/registration.js"></script>
</body>
</html>
